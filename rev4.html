<!DOCTYPE html><html lang="ko" translate="no"><head><meta charset="UTF-8"><meta name="google" content="notranslate"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>서울대 한국어 2B 복습 4 퀴즈</title>
<style>
:root{--main:#2e7d32;--blue:#3498db;--orange:#e67e22;--red:#e74c3c;--dark:#2c3e50;--bg:#f4f7f6;}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg);margin:0;padding:20px;color:#243443;line-height:1.75;}.wrap{max-width:960px;margin:0 auto}.card{background:#fff;border-radius:16px;padding:28px;box-shadow:0 4px 18px rgba(0,0,0,.08);margin:20px 0}h1{text-align:center;color:var(--dark);border-bottom:4px solid var(--main);padding-bottom:14px}.subtitle{text-align:center;color:#607d8b;margin-top:-4px}.info{background:#ecfff5;border-left:6px solid var(--main);padding:14px 18px;border-radius:0 12px 12px 0;margin:18px 0}.q-block{border-left:6px solid var(--main);background:#fbfdfc;padding:20px 24px;margin:22px 0;border-radius:0 12px 12px 0}.q-title{font-weight:800;color:var(--main);font-size:1.12rem;margin-bottom:10px}.q-text{font-size:1.06rem}.input{border:2px solid #cfd8dc;border-radius:8px;padding:8px 12px;font-size:1rem;min-width:230px;margin:3px 6px;font-weight:700;color:#1f618d;background:#fff}.input.correct{border-color:var(--main);background:#f0fff6}.input.wrong{border-color:var(--red);background:#fff5f5}.feedback{display:none;margin-top:12px;padding:12px;border-radius:8px}.feedback.ok{display:block;background:#ecfff5;color:#167a3a}.feedback.no{display:block;background:#fff1f0;color:#b03a2e}.btn{border:0;border-radius:9px;padding:12px 22px;color:#fff;font-weight:700;font-size:1rem;cursor:pointer;margin:6px;text-decoration:none;display:inline-block}.btn-blue{background:var(--blue)}.btn-orange{background:var(--orange)}.btn-gray{background:#95a5a6}.result{font-weight:800;text-align:center;font-size:1.15rem}.small{font-size:.93rem;color:#607d8b}@media(max-width:720px){.input{width:92%;min-width:0}.card{padding:20px}}
</style>
<script>
const quizData = {"title": "서울대 한국어 2B 복습 4 퀴즈", "subtitle": "10~12과 종합 복습", "grammar": ["10과: N 중(에서), 반말, V-(으)ㄹ래요, A/V/N-ㄴ데/는데/인데", "11과: ‘ㅅ’ 불규칙, N마다, V-는 게 어때요?, V-기로 하다", "12과: A-아/어 보이다, N처럼, A/V-는 편이다, A-게"], "questions": [{"kind": "대화", "text": "가: 점심에 뭐 먹을래요?<br>나: 저는 매운 음식이 좋아요.<br>가: 김치찌개하고 매운탕 중에서 뭐 먹을래요?<br>나: 김치찌개를 [[0]].<br>가: 그 식당은 어때요?<br>나: 음식은 맛있는데 [[1]].", "answers": [["먹을래요"], ["값이 비싸요"]]}, {"kind": "대화", "text": "가: 밤마다 잠을 잘 못 자요?<br>나: 네, 요즘 계속 그래요.<br>가: 운동을 해 보는 게 어때요?<br>나: 네, 운동을 [[0]].<br>가: 언제부터 할 거예요?<br>나: 오늘부터 운동하기로 [[1]].", "answers": [["해 볼게요"], ["했어요"]]}, {"kind": "대화", "text": "가: 새 친구 첫인상이 어땠어요?<br>나: 조용해 보였어요.<br>가: 실제 성격도 그래요?<br>나: 네, 조용한 [[0]].<br>가: 언니하고 닮았어요?<br>나: 네, 자매처럼 [[1]].", "answers": [["편이에요"], ["보여요"]]}, {"kind": "대화", "text": "가: 우리 동갑이니까 반말할까요?<br>나: 좋아요. 말을 놓아요.<br>가: 그럼 뭐 먹을래?<br>나: 나는 냉면을 [[0]].<br>가: 후식도 먹을래?<br>나: 아니, 후식은 [[1]].", "answers": [["먹을래"], ["필요 없어"]]}, {"kind": "읽기", "text": "저는 한식집에 갔습니다. 음식은 맛있었는데 서비스가 조금 느렸습니다. 그래도 분위기가 좋아서 다시 가고 싶습니다. 그 식당은 음식은 [[0]]. 그래도 분위기가 좋아서 [[1]].", "answers": [["맛있었는데 서비스가 조금 느렸습니다"], ["다시 가고 싶습니다"]]}, {"kind": "읽기", "text": "민수 씨는 소화가 안돼서 내과에 갔습니다. 의사는 식후마다 소화제를 먹으라고 했습니다. 민수 씨는 소화가 안돼서 [[0]]. 식후마다 [[1]].", "answers": [["내과에 갔습니다"], ["소화제를 먹습니다"]]}, {"kind": "읽기", "text": "지수 씨는 눈이 크고 입술이 얇습니다. 머리를 짧게 잘라서 전보다 어려 보입니다. 성격은 활발한 편입니다. 지수 씨는 전보다 [[0]]. 성격은 [[1]].", "answers": [["어려 보입니다"], ["활발한 편입니다"]]}, {"kind": "읽기", "text": "저는 요즘 스트레스가 쌓였습니다. 친구가 운동을 해 보는 게 어떠냐고 했습니다. 그래서 매일 저녁 산책하기로 했습니다. 저는 스트레스가 [[0]]. 그래서 매일 저녁 [[1]].", "answers": [["쌓였습니다"], ["산책하기로 했습니다"]]}]};
function renderText(text, qIndex){return text.replace(/\[\[(\d)\]\]/g,(_,n)=>`<input class="input" id="q-${qIndex}-${Number(n)}" placeholder="${Number(n)+1}번 빈칸" autocomplete="off">`)}
function renderQuiz(){const area=document.getElementById('quizArea');let html='';quizData.questions.forEach((q,i)=>{html+=`<div class="q-block"><div class="q-title">${i+1}. ${q.kind} 지문 - 빈칸에 맞는 말을 쓰세요.</div><div class="q-text">${renderText(q.text,i)}</div><div id="fb-q-${i}" class="feedback"></div></div>`});area.innerHTML=html}
function norm(s){return (s||'').trim()}
function submitQuiz(){let total=0,correct=0,empty=false;quizData.questions.forEach((q,qi)=>{q.answers.forEach((ans,ai)=>{total++;const input=document.getElementById(`q-${qi}-${ai}`);if(!norm(input.value))empty=true})});if(empty){alert('모든 빈칸에 답을 쓰세요.');return}quizData.questions.forEach((q,qi)=>{const wrong=[];q.answers.forEach((ans,ai)=>{const input=document.getElementById(`q-${qi}-${ai}`);const value=norm(input.value);const allowed=Array.isArray(ans)?ans:[ans];if(allowed.includes(value)){correct++;input.classList.add('correct')}else{input.classList.add('wrong');wrong.push(`${ai+1}번 정답: ${allowed[0]}`)}input.disabled=true});const fb=document.getElementById(`fb-q-${qi}`);fb.innerHTML=wrong.length?'오답 확인:<br>'+wrong.join('<br>'):'모두 정답입니다.';fb.className='feedback '+(wrong.length?'no':'ok')});const passScore=Math.ceil(total*0.7);const pass=correct>=passScore;const result=document.getElementById('resultArea');result.innerHTML=`<div class="card"><div class="result" style="color:${pass?'#167a3a':'#b03a2e'}">${pass?'통과':'다시 풀기 필요'}: ${correct} / ${total}</div><p class="small" style="text-align:center">통과 기준: ${passScore}개 이상 정답</p><div style="text-align:center"><button class="btn btn-orange" onclick="location.reload()">↻ 다시 풀기</button><a class="btn btn-gray" href="index.html">🏠 메뉴로 가기</a></div></div>`;result.scrollIntoView({behavior:'smooth'})}
window.onload=renderQuiz;
</script>
</head><body><div class="wrap"><h1>서울대 한국어 2B 복습 4 퀴즈</h1><p class="subtitle">10~12과 종합 복습</p><div class="card"><div class="info"><strong>학습 문법</strong><ul><li>10과: N 중(에서), 반말, V-(으)ㄹ래요, A/V/N-ㄴ데/는데/인데</li><li>11과: ‘ㅅ’ 불규칙, N마다, V-는 게 어때요?, V-기로 하다</li><li>12과: A-아/어 보이다, N처럼, A/V-는 편이다, A-게</li></ul><p class="small">1~4번은 대화 지문, 5~8번은 읽기 지문입니다. 각 문제는 빈칸 2개로 구성됩니다.</p></div><div style="text-align:center"><a class="btn btn-gray" href="index.html">← 메뉴로 가기</a><button class="btn btn-blue" onclick="submitQuiz()">↵ 제출하기</button></div></div><div id="quizArea"></div><div class="card" style="text-align:center"><button class="btn btn-blue" onclick="submitQuiz()">↵ 제출하기</button><a class="btn btn-gray" href="index.html">🏠 메뉴로 가기</a></div><div id="resultArea"></div></div></body></html>
