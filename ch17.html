<!DOCTYPE html><html lang="ko" translate="no"><head><meta charset="UTF-8"><meta name="google" content="notranslate"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>서울대 한국어 2B 17과 퀴즈</title>
<style>
:root{--main:#2e7d32;--blue:#3498db;--orange:#e67e22;--red:#e74c3c;--dark:#2c3e50;--bg:#f4f7f6;--soft:#fbfdfc;}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg);margin:0;padding:20px;color:#243443;line-height:1.75;}.wrap{max-width:960px;margin:0 auto}.card{background:#fff;border-radius:16px;padding:28px;box-shadow:0 4px 18px rgba(0,0,0,.08);margin:20px 0}h1{text-align:center;color:var(--dark);border-bottom:4px solid var(--main);padding-bottom:14px}.subtitle{text-align:center;color:#607d8b;margin-top:-4px}.info{background:#ecfff5;border-left:6px solid var(--main);padding:14px 18px;border-radius:0 12px 12px 0;margin:18px 0}.q-block{border-left:6px solid var(--main);background:var(--soft);padding:20px 24px;margin:22px 0;border-radius:0 12px 12px 0}.q-title{font-weight:800;color:var(--main);font-size:1.12rem;margin-bottom:10px}.q-text{font-size:1.06rem}.input{border:2px solid #cfd8dc;border-radius:8px;padding:8px 12px;font-size:1rem;min-width:250px;margin:3px 6px;font-weight:700;color:#1f618d;background:#fff}.input.correct{border-color:var(--main);background:#f0fff6}.input.wrong{border-color:var(--red);background:#fff5f5}.feedback{display:none;margin-top:12px;padding:12px;border-radius:8px}.feedback.ok{display:block;background:#ecfff5;color:#167a3a}.feedback.no{display:block;background:#fff1f0;color:#b03a2e}.btn{border:0;border-radius:9px;padding:12px 22px;color:#fff;font-weight:700;font-size:1rem;cursor:pointer;margin:6px;text-decoration:none;display:inline-block}.btn-blue{background:var(--blue)}.btn-orange{background:var(--orange)}.btn-gray{background:#95a5a6}.result{font-weight:800;text-align:center;font-size:1.15rem}.small{font-size:.93rem;color:#607d8b}.group-label{display:inline-block;background:#e8f5e9;color:#2e7d32;border-radius:999px;padding:3px 10px;font-size:.88rem;margin-right:6px}@media(max-width:720px){.input{width:92%;min-width:0}.card{padding:20px}}
</style>
<script>
const quizData = {"title": "서울대 한국어 2B 17과 퀴즈", "subtitle": "비행기를 놓칠 뻔했어요 - 사고·색과 무늬", "grammar": ["V-아/어 주다", "V-(으)ㄹ 뻔하다", "‘ㅎ’ 불규칙", "V-아/어 있다"], "questions": [{"kind": "대화", "text": "가: 왜 이렇게 늦었어요?<br>나: 지하철을 잘못 타서 비행기를 놓칠 뻔했어요.<br>가: 정말 큰일 날 뻔했네요.<br>나: 네, 비행기를 [[0]].<br>가: 표는 누가 찾아 줬어요?<br>나: 직원이 표를 [[1]].", "answers": [["놓칠 뻔했어요"], ["찾아 줬어요"]]}, {"kind": "대화", "text": "가: 가방이 열려 있어요.<br>나: 정말요? 지갑이 떨어질 뻔했네요.<br>가: 제가 닫아 줄까요?<br>나: 네, 가방을 [[0]].<br>가: 지퍼는 고장 나지 않았어요?<br>나: 아니요, 지퍼는 [[1]].", "answers": [["닫아 주세요"], ["닫혀 있어요"]]}, {"kind": "대화", "text": "가: 어떤 셔츠를 찾으세요?<br>나: 하얀색 셔츠를 찾고 있어요.<br>가: 줄무늬 셔츠도 괜찮아요?<br>나: 아니요, [[0]] 셔츠가 좋아요.<br>가: 여기 걸려 있는 셔츠예요?<br>나: 네, 벽에 [[1]].", "answers": [["하얀색"], ["걸려 있어요"]]}, {"kind": "대화", "text": "가: 어제 왜 다쳤어요?<br>나: 계단에서 넘어질 뻔했어요.<br>가: 누가 도와줬어요?<br>나: 친구가 [[0]].<br>가: 지금 다리는 어때요?<br>나: 파스가 붙어 [[1]].", "answers": [["잡아 줬어요"], ["있어요"]]}, {"kind": "읽기", "text": "어제 공항에 늦게 도착했습니다. 길이 막혀서 비행기를 놓칠 뻔했습니다. 다행히 직원이 탑승구를 알려 주었습니다. 저는 비행기를 [[0]]. 직원이 탑승구를 [[1]].", "answers": [["놓칠 뻔했습니다"], ["알려 주었습니다"]]}, {"kind": "읽기", "text": "민수 씨는 지갑을 떨어뜨릴 뻔했습니다. 가방이 열려 있었기 때문입니다. 친구가 가방을 닫아 주어서 지갑을 잃어버리지 않았습니다. 가방이 [[0]]. 친구가 가방을 [[1]].", "answers": [["열려 있었습니다"], ["닫아 주었습니다"]]}, {"kind": "읽기", "text": "가게 안에는 여러 가지 셔츠가 걸려 있습니다. 저는 하얀색 셔츠와 파란색 줄무늬 셔츠를 보았습니다. 결국 하얀색 셔츠를 샀습니다. 셔츠가 가게 안에 [[0]]. 저는 [[1]].", "answers": [["걸려 있습니다"], ["하얀색 셔츠를 샀습니다"]]}, {"kind": "읽기", "text": "지수 씨는 길에서 넘어질 뻔했습니다. 바닥에 물이 떨어져 있었기 때문입니다. 옆에 있던 친구가 잡아 주어서 다치지 않았습니다. 지수 씨는 [[0]]. 친구가 [[1]].", "answers": [["넘어질 뻔했습니다"], ["잡아 주었습니다"]]}]};
function renderText(text, qIndex){return text.replace(/\[\[(\d)\]\]/g,(_,n)=>`<input class="input" id="q-${qIndex}-${Number(n)}" placeholder="${Number(n)+1}번 빈칸" autocomplete="off">`)}
function renderQuiz(){const area=document.getElementById('quizArea');let html='';quizData.questions.forEach((q,i)=>{const label=i<4?'대화':'읽기';html+=`<div class="q-block"><div class="q-title"><span class="group-label">${label}</span>${i+1}. 빈칸에 맞는 말을 쓰세요.</div><div class="q-text">${renderText(q.text,i)}</div><div id="fb-q-${i}" class="feedback"></div></div>`});area.innerHTML=html}
function norm(s){return (s||'').trim()}
function submitQuiz(){let total=0,correct=0,empty=false;quizData.questions.forEach((q,qi)=>{q.answers.forEach((ans,ai)=>{total++;const input=document.getElementById(`q-${qi}-${ai}`);if(!norm(input.value))empty=true})});if(empty){alert('모든 빈칸에 답을 쓰세요.');return}quizData.questions.forEach((q,qi)=>{const wrong=[];q.answers.forEach((ans,ai)=>{const input=document.getElementById(`q-${qi}-${ai}`);const value=norm(input.value);const allowed=Array.isArray(ans)?ans:[ans];if(allowed.includes(value)){correct++;input.classList.add('correct')}else{input.classList.add('wrong');wrong.push(`${ai+1}번 정답: ${allowed[0]}`)}input.disabled=true});const fb=document.getElementById(`fb-q-${qi}`);fb.innerHTML=wrong.length?'오답 확인:<br>'+wrong.join('<br>'):'모두 정답입니다.';fb.className='feedback '+(wrong.length?'no':'ok')});const passScore=Math.ceil(total*0.7);const pass=correct>=passScore;const result=document.getElementById('resultArea');result.innerHTML=`<div class="card"><div class="result" style="color:${pass?'#167a3a':'#b03a2e'}">${pass?'통과':'다시 풀기 필요'}: ${correct} / ${total}</div><p class="small" style="text-align:center">통과 기준: ${passScore}개 이상 정답</p><div style="text-align:center"><button class="btn btn-orange" onclick="location.reload()">↻ 다시 풀기</button><a class="btn btn-gray" href="index.html">🏠 메뉴로 가기</a></div></div>`;result.scrollIntoView({behavior:'smooth'})}
window.onload=renderQuiz;
</script>
</head><body><div class="wrap"><h1>서울대 한국어 2B 17과 퀴즈</h1><p class="subtitle">비행기를 놓칠 뻔했어요 - 사고·색과 무늬</p><div class="card"><div class="info"><strong>문제 구성</strong><p class="small">1~4번은 대화 지문, 5~8번은 읽기 지문입니다. 각 문제는 빈칸 2개로 구성됩니다. 모든 빈칸을 입력해야 채점할 수 있고, 70% 이상이면 통과입니다.</p></div><div style="text-align:center"><a class="btn btn-gray" href="index.html">← 메뉴로 가기</a><button class="btn btn-blue" onclick="submitQuiz()">↵ 제출하기</button></div></div><div id="quizArea"></div><div class="card" style="text-align:center"><button class="btn btn-blue" onclick="submitQuiz()">↵ 제출하기</button><a class="btn btn-gray" href="index.html">🏠 메뉴로 가기</a></div><div id="resultArea"></div></div></body></html>
